<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>USDconfig Wizard · viSales</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
:root {
  --bg:        #f5f5f7;
  --panel:     #ffffff;
  --card:      #f0f0f3;
  --hover:     #e8e8ec;
  --border:    rgba(0,0,0,0.08);
  --amber:     #f97316;
  --amber-dim: rgba(249,115,22,0.10);
  --amber-brd: rgba(249,115,22,0.35);
  --cyan:      #0891b2;
  --text-hi:   #1a1a1a;
  --text-mid:  #666;
  --text-lo:   #aaa;
  --font:      -apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  --panel-w:   320px;
  --hdr:       54px;
  --r:         14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text-hi);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
#app{display:grid;grid-template-columns:1fr var(--panel-w);grid-template-rows:var(--hdr) 1fr;height:100vh;height:100dvh}

/* ── HEADER ── */
header{
  grid-column:1/-1;display:flex;align-items:center;gap:10px;
  padding:0 20px;background:var(--panel);border-bottom:1px solid var(--border);
}
.logo{width:28px;height:28px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center}
.logo svg{color:#fff}
.brand{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.brand span{color:var(--amber)}
.model-name{font-size:13px;color:var(--text-mid);margin-left:4px}

/* ── VIEWER ── */
#viewer-wrap{position:relative;background:var(--bg)}
model-viewer{width:100%;height:100%}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg);transition:opacity .3s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PANEL ── */
#panel{
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}

/* Progress bar */
#progress{
  padding:16px 20px 0;
  display:flex;gap:6px;align-items:center;flex-shrink:0;
}
.prog-step{
  flex:1;height:3px;border-radius:2px;background:var(--card);
  transition:background .3s;
}
.prog-step.done{background:var(--amber)}
.prog-step.active{background:var(--amber);opacity:.45}

/* Step label */
#step-header{
  padding:14px 20px 10px;flex-shrink:0;
}
.step-num{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text-lo);text-transform:uppercase;margin-bottom:3px}
.step-title{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--text-hi)}

/* Step content (scrollable) */
#step-body{
  flex:1;overflow-y:auto;padding:6px 16px 16px;
  position:relative;
}

/* Option cards */
.opt-card{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:var(--r);border:1.5px solid var(--border);
  background:var(--card);cursor:pointer;margin-bottom:8px;
  transition:border-color .15s,background .15s,transform .1s;
  user-select:none;
}
.opt-card:hover{background:var(--hover);border-color:rgba(0,0,0,.12)}
.opt-card.selected{
  border-color:var(--amber-brd);background:var(--amber-dim);
}
.opt-card.selected .opt-check{opacity:1;transform:scale(1)}
.opt-label{font-size:14px;font-weight:600;flex:1;text-transform:capitalize}
.opt-check{
  width:20px;height:20px;border-radius:50%;background:var(--amber);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  opacity:0;transform:scale(.6);transition:opacity .2s,transform .2s;
}
.opt-check svg{color:#fff;width:11px;height:11px}

/* Color swatches */
.swatch-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:2px 0}
.swatch{
  aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:transform .12s,border-color .12s;
}
.swatch:hover{transform:scale(1.18)}
.swatch.selected{border-color:var(--amber);transform:scale(1.12)}
.color-name{
  font-size:11px;color:var(--text-mid);text-align:center;
  padding:8px 0 0;min-height:28px;line-height:1.3;
}

/* Summary chips */
#summary{
  border-top:1px solid var(--border);padding:12px 16px;
  display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;
}
.chip{
  font-size:11px;font-weight:500;padding:4px 10px;
  border-radius:999px;background:var(--card);color:var(--text-mid);
  cursor:pointer;border:1px solid var(--border);transition:background .12s;
  white-space:nowrap;
}
.chip:hover{background:var(--hover)}
.chip strong{color:var(--text-hi)}

/* Footer buttons */
#footer{padding:12px 16px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 16px;border-radius:var(--r);border:none;cursor:pointer;
  font-size:13px;font-weight:600;font-family:var(--font);transition:opacity .15s,transform .1s;
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--amber);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--card);color:var(--text-hi);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--hover)}

/* Slide transitions */
.step-slide{animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}

/* Engine badge */
.badge{
  position:absolute;top:10px;right:12px;z-index:10;
  font-size:10px;font-weight:600;letter-spacing:.04em;
  padding:3px 8px;border-radius:999px;
  background:rgba(249,115,22,.12);color:var(--amber);
  border:1px solid rgba(249,115,22,.25);
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
    </div>
    <span class="brand"><span>USD</span>config</span>
    <span class="model-name">Vitra ID Chair</span>
  </header>

  <!-- Viewer -->
  <div id="viewer-wrap">
    <div class="badge">model-viewer · WebGL</div>
    <model-viewer
      id="mv"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="3000"
      rotation-per-second="10deg"
      shadow-intensity="1.4"
      shadow-softness="0.9"
      environment-image="neutral"
      exposure="1.15"
      ar
      ar-modes="quick-look webxr scene-viewer"
    >
      <button slot="ar-button" style="display:none"></button>
    </model-viewer>
    <div id="loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Wizard Panel -->
  <div id="panel">
    <div id="progress"></div>
    <div id="step-header">
      <div class="step-num" id="step-num"></div>
      <div class="step-title" id="step-title"></div>
    </div>
    <div id="step-body"></div>
    <div id="summary"></div>
    <div id="footer">
      <button class="btn btn-primary" id="btn-ar" onclick="doAR()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12H3a9 9 0 0018 0h-2M12 3v9m0 0l-3-3m3 3l3-3"/></svg>
        In AR anzeigen
      </button>
      <button class="btn btn-secondary" id="btn-share" onclick="doShare()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Konfiguration teilen
      </button>
    </div>
  </div>

</div>
<script>
/* ── BEZUG COLORS ── */
const BEZUG_COLORS = {
  "Plano_03_pergament_cremeweiss":"#f5f5f2","Plano_07_orange":"#e9866d",
  "Plano_34_wiesengruen_forest":"#d6e5ab","Plano_05_cremeweiss_sierragrau":"#f4f4f2",
  "Plano_11_kastanie_cognac":"#9e7c84","Plano_12_lichtgrau_eisblau":"#f8fbff",
  "Plano_13_nero_eisblau":"#979e9e","Plano_15_pink_sierragrau":"#f6e5ee",
  "Plano_16_dunkelrot_eisblau":"#bd727e","Plano_17_forest_sierragrau":"#b9bca5",
  "Plano_18_hellgrau_sierragrau":"#f2f2f1","Plano_19_sierragrau":"#d4cec8",
  "Plano_20_tobacco_cremeweiss":"#e6d6c8","Plano_39_gelb_pastellgruen":"#fdf496",
  "Plano_40_coconut_forest":"#917f82","Plano_41_classic_green_forest":"#a6dea7",
  "Plano_43_petrol_nero":"#66969a","Plano_52_mint_forest":"#b3e1da",
  "Plano_54_braun":"#a5938c","Plano_61_classic_green_cognac":"#abd997",
  "Plano_62_dunkelgrau_nero":"#a8a8ad","Plano_63_rot_poppy_red":"#e88397",
  "Plano_66_nero":"#93989c","Plano_67_cognac":"#d4af76",
  "Plano_68_avocado":"#dadd95","Plano_69_dunkelgrau":"#a8a8ad",
  "Plano_72_poppy_red":"#e4787c","Plano_73_nero_coconut":"#93989c",
  "Plano_74_sierragrau_nero":"#d4cec8","Plano_75_kastanie_nero":"#9e7c84",
  "Plano_80_coffee":"#cabdb2","Plano_81_blau_coconut":"#98d4f3",
  "Plano_84_poppy_red_champagner":"#ed767d","Plano_86_dunkelbau_braun":"#7c899a",
  "Plano_87_nero_cremeweiss":"#597789","Plano_96_rot_cognac":"#f28183",
  "Plano_97_rot_coconut":"#ef788c","Plano_98_dunkelrot_nero":"#c7747a",
  "Plano_99_cognac_pergament":"#d7ad84",
};

/* ── STEPS DEFINITION ── */
const STEPS = [
  {
    key: 'Sitzform',
    title: 'Sitzform wählen',
    type: 'cards',
    options: ['kontur', 'normal'],
  },
  {
    key: 'Lehne',
    title: 'Lehnenform wählen',
    type: 'cards',
    options: ['soft', 'trim'],
  },
  {
    key: 'Armlehnen',
    title: 'Armlehnen wählen',
    type: 'cards',
    options: ['ohne', 'armlehnen_exoliert_3d', 'armlehnen_poliert_ring'],
  },
  {
    key: 'Bezug',
    title: 'Bezugfarbe wählen',
    type: 'swatches',
    options: Object.keys(BEZUG_COLORS),
  },
];

/* ── STATE ── */
const state = {
  Sitzform: 'kontur',
  Lehne: 'soft',
  Armlehnen: 'ohne',
  Bezug: Object.keys(BEZUG_COLORS)[0],
};
let currentStep = 0;
let advanceTimer = null;

/* ── RESOLVE GLB ── */
function resolveGlb() {
  const s = state.Sitzform.toLowerCase();
  const l = state.Lehne.toLowerCase();
  const a = state.Armlehnen.toLowerCase().replace(/ /g,'_');
  return `assets/product-${s}-${l}-${a}.glb`;
}
function resolveUsdz() {
  const s = state.Sitzform.toLowerCase();
  const l = state.Lehne.toLowerCase();
  const a = state.Armlehnen.toLowerCase().replace(/ /g,'_');
  return `assets/product-${s}-${l}-${a}.usdz`;
}

/* ── MODEL VIEWER ── */
const mv = document.getElementById('mv');
mv.addEventListener('load', () => {
  document.getElementById('loading').classList.add('hidden');
  /* Apply Bezug variant */
  if (mv.availableVariants?.includes(state.Bezug)) {
    mv.variantName = state.Bezug;
  }
});

function updateViewer() {
  const glb = resolveGlb();
  if (glb !== mv.getAttribute('src')) {
    document.getElementById('loading').classList.remove('hidden');
    mv.setAttribute('src', glb);
  }
  const usdz = resolveUsdz();
  if (usdz) mv.setAttribute('ios-src', usdz);
  if (mv.availableVariants?.includes(state.Bezug)) {
    mv.variantName = state.Bezug;
  }
}

/* ── RENDER STEP ── */
function renderStep(idx) {
  currentStep = Math.max(0, Math.min(STEPS.length - 1, idx));
  const step = STEPS[currentStep];
  const total = STEPS.length;

  /* Progress dots */
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'prog-step' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    prog.appendChild(d);
  }

  /* Step header */
  document.getElementById('step-num').textContent = `Schritt ${currentStep + 1} von ${total}`;
  document.getElementById('step-title').textContent = step.title;

  /* Step body */
  const body = document.getElementById('step-body');
  body.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'step-slide';

  if (step.type === 'cards') {
    step.options.forEach(opt => {
      const card = document.createElement('div');
      card.className = 'opt-card' + (state[step.key] === opt ? ' selected' : '');
      card.innerHTML = `
        <span class="opt-label">${opt.replace(/_/g,' ')}</span>
        <span class="opt-check">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="2,6 5,9 10,3"/></svg>
        </span>`;
      card.addEventListener('click', () => selectOption(step.key, opt, currentStep));
      wrap.appendChild(card);
    });

  } else if (step.type === 'swatches') {
    const grid = document.createElement('div');
    grid.className = 'swatch-grid';
    const nameEl = document.createElement('div');
    nameEl.className = 'color-name';
    nameEl.id = 'color-name';

    const sel = state[step.key];
    nameEl.textContent = sel ? sel.replace(/Plano_\d+_/, '').replace(/_/g, ' ') : '';

    Object.entries(BEZUG_COLORS).forEach(([key, hex]) => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (state[step.key] === key ? ' selected' : '');
      sw.style.background = hex;
      sw.title = key.replace(/Plano_\d+_/, '').replace(/_/g, ' ');
      sw.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
        state[step.key] = key;
        nameEl.textContent = key.replace(/Plano_\d+_/, '').replace(/_/g, ' ');
        if (mv.availableVariants?.includes(key)) mv.variantName = key;
        updateSummary();
      });
      grid.appendChild(sw);
    });
    wrap.appendChild(grid);
    wrap.appendChild(nameEl);
  }

  body.appendChild(wrap);
  updateSummary();
}

/* ── SELECT OPTION (cards) ── */
function selectOption(key, value, stepIdx) {
  const prev = state[key];
  state[key] = value;

  /* Update card visuals */
  document.querySelectorAll('.opt-card').forEach(card => {
    const label = card.querySelector('.opt-label').textContent.replace(/ /g,'_');
    const isSelected = label === value.replace(/ /g,'_') ||
                       card.querySelector('.opt-label').textContent === value.replace(/_/g,' ');
    card.classList.toggle('selected', isSelected);
  });

  /* Update 3D model if structural variant changed */
  if (key !== 'Bezug') {
    updateViewer();
  }
  updateSummary();

  /* Auto-advance to next step */
  clearTimeout(advanceTimer);
  if (stepIdx < STEPS.length - 1) {
    advanceTimer = setTimeout(() => renderStep(stepIdx + 1), 420);
  }
}

/* ── SUMMARY CHIPS ── */
function updateSummary() {
  const sum = document.getElementById('summary');
  sum.innerHTML = '';
  STEPS.slice(0, currentStep).forEach(step => {
    const val = state[step.key];
    if (!val) return;
    const label = step.key === 'Bezug'
      ? val.replace(/Plano_\d+_/, '').replace(/_/g, ' ')
      : val.replace(/_/g, ' ');
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${step.key}: <strong>${label}</strong>`;
    chip.addEventListener('click', () => {
      clearTimeout(advanceTimer);
      renderStep(STEPS.findIndex(s => s.key === step.key));
    });
    sum.appendChild(chip);
  });
}

/* ── AR ── */
function doAR() {
  if (mv.canActivateAR) { mv.activateAR(); return; }
  const usdz = resolveUsdz();
  if (usdz) window.location.href = usdz;
}

/* ── SHARE ── */
function doShare() {
  const url = new URL(window.location.href);
  url.search = '';
  url.searchParams.set('Sitzform', state.Sitzform);
  url.searchParams.set('Lehne', state.Lehne);
  url.searchParams.set('Armlehnen', state.Armlehnen);
  url.searchParams.set('Bezug', state.Bezug);
  if (navigator.share) {
    navigator.share({ title: 'Vitra ID Chair Konfiguration', url: url.toString() });
  } else {
    navigator.clipboard.writeText(url.toString()).then(() => {
      const btn = document.getElementById('btn-share');
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ Link kopiert';
      setTimeout(() => btn.innerHTML = orig, 2000);
    });
  }
}

/* ── INIT ── */
updateViewer();
renderStep(0);
</script>
</body>
</html>
